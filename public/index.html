<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CC Amazon Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            background: #0f0f1a;
            border-bottom: 1px solid #00ff8833;
            padding: 0 16px;
            height: 46px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            z-index: 500;
        }
        #header h1 { color: #00ff88; font-size: 14px; letter-spacing: 3px; }
        #last-update { color: #444; font-size: 11px; }
        #header-stats { margin-left: auto; display: flex; gap: 16px; font-size: 11px; align-items: center; }
        .stat { color: #555; letter-spacing: 1px; }
        .stat b { color: #00ff88; font-weight: normal; }

        #status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #00ff88; box-shadow: 0 0 6px #00ff88; flex-shrink: 0;
        }
        #status-dot.offline { background: #ff4444; box-shadow: 0 0 6px #ff4444; }

        /* ── Main ── */
        #main { display: flex; flex: 1; overflow: hidden; }

        /* ── Map / iframe ── */
        #map-wrap { flex: 1; position: relative; background: #0a0a0f; min-width: 0; overflow: hidden; }

        #dynmap-frame {
            width: 100%; height: 100%;
            border: none; display: block;
        }

        /* Transparent right-click capture overlay — pointer-events off normally,
           only captures contextmenu which bubbles from the iframe via injection */
        #map-hint {
            position: absolute; bottom: 10px; left: 10px; z-index: 10;
            background: rgba(10,10,15,0.85); border: 1px solid #1a1a2e;
            color: #333; font-size: 10px; padding: 4px 10px; border-radius: 2px;
            pointer-events: none; letter-spacing: 1px;
        }

        /* coord flash when right-clicking */
        #coord-flash {
            display: none;
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,255,136,0.15); border: 1px solid #00ff8866;
            color: #00ff88; font-size: 11px; padding: 5px 14px; border-radius: 3px;
            pointer-events: none; letter-spacing: 1px; z-index: 10;
        }
        #coord-flash.show { display: block; }

        /* ── Side panel ── */
        #side-panel {
            width: 320px; flex-shrink: 0;
            background: #0f0f1a;
            border-left: 1px solid #1a1a2e;
            display: flex; flex-direction: column; overflow: hidden;
            z-index: 500;
        }

        /* ── Tabs ── */
        #tabs { display: flex; border-bottom: 1px solid #1a1a2e; flex-shrink: 0; }
        .tab {
            flex: 1; padding: 11px 4px; text-align: center;
            cursor: pointer; font-size: 11px; letter-spacing: 2px; color: #444;
            border-bottom: 2px solid transparent; transition: color 0.15s;
            font-family: 'Courier New', monospace;
        }
        .tab:hover { color: #888; }
        .tab.active { color: #00ff88; border-bottom-color: #00ff88; }

        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 10px; flex-direction: column; gap: 8px; }
        .tab-content.active { display: flex; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }

        /* ── Turtle card ── */
        .turtle-card {
            background: #12121e; border: 1px solid #1a1a2e;
            border-left: 3px solid #2a2a4a; border-radius: 3px; padding: 10px;
        }
        .turtle-card.DELIVERY { border-left-color: #00ff88; }
        .turtle-card.SUPPORT  { border-left-color: #4488ff; }
        .turtle-card.offline  { opacity: 0.4; }

        .tc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; }
        .tc-name { font-size: 13px; color: #fff; font-weight: bold; letter-spacing: 1px; }
        .tc-sub  { font-size: 10px; color: #444; margin-top: 1px; letter-spacing: 1px; }

        .sbadge {
            font-size: 9px; padding: 2px 7px; border-radius: 2px;
            letter-spacing: 1px; font-weight: bold;
        }
        .sbadge.IDLE       { background:#0a2a1a; color:#00ff88; }
        .sbadge.TRAVELLING { background:#2a2a0a; color:#ffcc00; }
        .sbadge.WORKING    { background:#0a1a3a; color:#4499ff; }
        .sbadge.LOADING    { background:#2a1a0a; color:#ff8844; }
        .sbadge.RETURNING  { background:#1a0a2a; color:#aa66ff; }
        .sbadge.ERROR      { background:#2a0a0a; color:#ff4444; }

        .fuel-track { background:#080810; height:3px; border-radius:2px; margin:7px 0; overflow:hidden; }
        .fuel-fill  { height:100%; border-radius:2px; background:#00ff88; transition:width 1s,background 0.5s; }
        .fuel-fill.med  { background:#ffcc00; }
        .fuel-fill.low  { background:#ff8844; }
        .fuel-fill.crit { background:#ff4444; }

        .tc-row { display:flex; gap:12px; font-size:10px; color:#555; flex-wrap:wrap; }
        .tc-row .v { color:#aaa; }

        .tc-locate {
            float:right; font-size:9px; color:#444; cursor:pointer;
            padding:1px 5px; border:1px solid #1e1e3e; border-radius:2px;
            letter-spacing:1px; background:transparent; font-family:'Courier New',monospace;
            margin-left:6px;
        }
        .tc-locate:hover { color:#00ff88; border-color:#00ff88; }

        /* ── Job card ── */
        .job-card {
            background:#12121e; border:1px solid #1a1a2e;
            border-left:3px solid #333; border-radius:3px; padding:10px;
        }
        .job-card.IN_PROGRESS { border-left-color:#4488ff; }
        .job-card.PENDING     { border-left-color:#ffaa00; }
        .job-card.COMPLETE    { border-left-color:#00ff88; opacity:0.45; }
        .job-card.FAILED      { border-left-color:#ff4444; }

        .jc-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
        .jc-id   { font-size:10px; color:#444; }
        .jc-type { font-size:12px; color:#ccc; letter-spacing:1px; }
        .jc-assigned { font-size:10px; color:#4488ff; margin-top:4px; }

        .jbadge { font-size:9px; padding:2px 6px; border-radius:2px; letter-spacing:1px; }
        .jbadge.PENDING     { background:#2a2000; color:#ffaa00; }
        .jbadge.IN_PROGRESS { background:#001030; color:#4488ff; }
        .jbadge.COMPLETE    { background:#002010; color:#00ff88; }
        .jbadge.FAILED      { background:#200000; color:#ff4444; }

        /* ── Commands ── */
        .cmd-section { margin-bottom: 18px; }
        .cmd-title { font-size:10px; color:#00ff88; letter-spacing:3px; margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid #1a1a2e; }

        .field-row { display:flex; gap:6px; margin-bottom:7px; align-items:center; }
        .field-row input, .field-row select {
            flex:1; background:#080810; border:1px solid #1e1e3e; color:#ddd;
            font-family:'Courier New',monospace; font-size:11px; padding:6px 8px;
            border-radius:2px; outline:none; transition:border-color 0.15s;
        }
        .field-row input:focus, .field-row select:focus { border-color:#00ff8866; }
        .field-row label { font-size:10px; color:#444; white-space:nowrap; letter-spacing:1px; }

        .btn {
            width:100%; padding:8px 12px; background:#12121e; border:1px solid #1e1e3e;
            color:#bbb; font-family:'Courier New',monospace; font-size:11px; letter-spacing:1px;
            cursor:pointer; border-radius:2px; text-align:left; margin-bottom:5px; transition:all 0.15s;
        }
        .btn:hover    { background:#1a1a2e; border-color:#3e3e6e; color:#fff; }
        .btn.primary  { border-color:#004422; color:#00ff88; }
        .btn.primary:hover  { background:#0a1e14; border-color:#00ff88; }
        .btn.danger   { border-color:#3a1010; color:#ff6666; }
        .btn.danger:hover   { background:#1e0a0a; border-color:#ff4444; color:#ff4444; }
        .btn.warning  { border-color:#3a2a00; color:#ffaa44; }
        .btn.warning:hover  { background:#1e1a0a; border-color:#ffaa00; color:#ffaa00; }

        /* ── Modal ── */
        #backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; }
        #backdrop.show { display:block; }
        #modal {
            display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            background:#0f0f1a; border:1px solid #00ff8866; border-radius:4px;
            padding:20px; width:340px; z-index:1001;
        }
        #modal.show { display:block; }

        .modal-title { color:#00ff88; font-size:12px; letter-spacing:3px; margin-bottom:16px; }
        .modal-field { margin-bottom:10px; }
        .modal-field label { display:block; font-size:10px; color:#444; letter-spacing:1px; margin-bottom:4px; }
        .modal-coord-row { display:flex; gap:6px; }
        .modal-coord-row input, .modal-field input {
            width:100%; background:#080810; border:1px solid #1e1e3e; color:#ddd;
            font-family:'Courier New',monospace; font-size:12px; padding:7px 10px; border-radius:2px; outline:none;
        }
        .modal-coord-row input { width:auto; flex:1; }
        .modal-coord-row input:focus, .modal-field input:focus { border-color:#00ff8866; }
        .modal-actions { display:flex; gap:8px; margin-top:16px; }
        .modal-actions .btn { margin:0; flex:1; text-align:center; }

        .coord-hint {
            background:#0a1a0a; border:1px solid #004422; border-radius:3px;
            padding:6px 10px; font-size:10px; color:#448844; letter-spacing:1px;
            margin-bottom:10px;
        }

        /* ── Toast ── */
        #toast {
            position:fixed; bottom:20px; right:20px; background:#0f0f1a;
            border:1px solid #00ff8866; color:#00ff88; font-size:11px; letter-spacing:1px;
            padding:8px 16px; border-radius:3px; z-index:2000; opacity:0;
            transition:opacity 0.3s; pointer-events:none;
        }
        #toast.show { opacity:1; }
        #toast.err  { border-color:#ff444466; color:#ff4444; }

        .empty { color:#2a2a4a; font-size:12px; text-align:center; padding:30px 0; letter-spacing:1px; }
    </style>
</head>
<body>

<div id="header">
    <div id="status-dot"></div>
    <h1>◆ CC AMAZON NETWORK</h1>
    <span style="color:#1e1e3e">|</span>
    <div id="last-update">connecting...</div>
    <div id="header-stats">
        <div class="stat">ONLINE <b id="s-online">0</b></div>
        <div class="stat">ACTIVE <b id="s-active">0</b></div>
        <div class="stat">JOBS <b id="s-jobs">0</b></div>
        <a href="http://192.168.86.35:8123" target="_blank"
           style="color:#444;font-size:11px;text-decoration:none;border:1px solid #1e1e3e;padding:3px 10px;border-radius:2px;letter-spacing:1px;"
           onmouseover="this.style.color='#00ff88';this.style.borderColor='#00ff88'"
           onmouseout="this.style.color='#444';this.style.borderColor='#1e1e3e'">DYNMAP ↗</a>
    </div>
</div>

<div id="main">
    <div id="map-wrap">
        <!-- Dynmap runs natively inside the iframe — same-origin via our proxy -->
        <iframe id="dynmap-frame" src="/dynmap-frame"></iframe>
        <div id="map-hint">RIGHT-CLICK MAP → DISPATCH DELIVERY</div>
        <div id="coord-flash"></div>
    </div>

    <div id="side-panel">
        <div id="tabs">
            <div class="tab active" onclick="switchTab('fleet')">FLEET</div>
            <div class="tab"        onclick="switchTab('jobs')">JOBS</div>
            <div class="tab"        onclick="switchTab('commands')">COMMANDS</div>
        </div>

        <div id="tab-fleet"    class="tab-content active"><div class="empty">LOADING...</div></div>
        <div id="tab-jobs"     class="tab-content"><div class="empty">NO ACTIVE JOBS</div></div>
        <div id="tab-commands" class="tab-content">

            <div class="cmd-section">
                <div class="cmd-title">DISPATCH DELIVERY</div>
                <div class="coord-hint">OR right-click anywhere on the map</div>
                <div class="field-row">
                    <label>X</label><input id="cx" type="number" placeholder="0">
                    <label>Y</label><input id="cy" type="number" placeholder="67" value="67">
                    <label>Z</label><input id="cz" type="number" placeholder="0">
                </div>
                <button class="btn primary" onclick="openModalFromCmd()">▶ OPEN DISPATCH</button>
            </div>

            <div class="cmd-section">
                <div class="cmd-title">FLEET CONTROL</div>
                <div class="field-row">
                    <select id="turtle-sel"><option value="">— Select turtle —</option></select>
                </div>
                <button class="btn" onclick="cmdRecall()">↩ RECALL SELECTED</button>
                <button class="btn danger" onclick="cmdRecallAll()">⚠ RECALL ALL TURTLES</button>
            </div>

            <div class="cmd-section">
                <div class="cmd-title">SYSTEM</div>
                <button class="btn warning" onclick="cmdUpdateAll()">↻ OTA UPDATE ALL TURTLES</button>
            </div>

        </div>
    </div>
</div>

<div id="backdrop" onclick="closeModal()"></div>
<div id="modal">
    <div class="modal-title">▶ REQUEST DELIVERY</div>
    <div class="modal-field">
        <label>DESTINATION COORDINATES</label>
        <div class="modal-coord-row">
            <input id="m-x" type="number" placeholder="X">
            <input id="m-y" type="number" placeholder="Y" value="67">
            <input id="m-z" type="number" placeholder="Z">
        </div>
    </div>
    <div class="modal-field">
        <label>NOTES (optional)</label>
        <input id="m-note" type="text" placeholder="e.g. building supplies">
    </div>
    <div class="modal-actions">
        <button class="btn danger"  onclick="closeModal()">CANCEL</button>
        <button class="btn primary" onclick="submitDelivery()">DISPATCH</button>
    </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// DYNMAP IFRAME — same-origin via /dynmap-frame proxy
// ═══════════════════════════════════════════════════════════════════════════

const DEPOT_X = 154, DEPOT_Z = -2803;
let lastState = { turtles: {}, jobs: [] };

const frame = document.getElementById('dynmap-frame');

// Navigate the iframe to a Minecraft coordinate using Dynmap's URL hash.
// Dynmap hash format: #;X;Y;Z;zoom;...;mapname
function dynmapGoTo(x, y, z) {
    try {
        const dw = frame.contentWindow;
        const cur = dw.location.hash || '';
        const parts = cur.replace(/^#;?/, '').split(';');
        // Preserve map name from current hash if present
        const mapName = (parts.length > 8 && parts[8]) ? parts[8] : 'flat';
        dw.location.hash = `#;${Math.round(x)};${Math.round(y)};${Math.round(z)};0;0;0;0;0;${mapName}`;
    } catch (e) {
        console.warn('[Frame] Hash nav failed:', e);
    }
}

// ── Inject right-click handler into Dynmap iframe once it loads ──────────────
frame.addEventListener('load', () => {
    // Navigate to depot on first load
    dynmapGoTo(DEPOT_X, 67, DEPOT_Z);

    try {
        const dw  = frame.contentWindow;
        const doc = frame.contentDocument;

        doc.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            let mcX = null, mcZ = null;

            // ── Method 1: Use Dynmap's internal map projection ──────────────
            // Dynmap exposes dynmap.map (Leaflet) and a coordinate projection.
            const dm = dw.dynmap;
            if (dm && dm.map) {
                try {
                    const dmMap   = dm.map;
                    const cont    = dmMap.getContainer();
                    const rect    = cont.getBoundingClientRect();
                    const latlng  = dmMap.containerPointToLatLng(
                        dw.L.point(e.clientX - rect.left, e.clientY - rect.top)
                    );

                    // Try Dynmap's own fromLatLngToLocation if available
                    const proj = dm.getProjection ? dm.getProjection() : null;
                    if (proj && proj.fromLatLngToLocation) {
                        const loc = proj.fromLatLngToLocation(latlng, 64);
                        mcX = Math.round(loc.x);
                        mcZ = Math.round(loc.z);
                        console.log('[Dynmap] Projection coords:', mcX, mcZ);
                    } else {
                        // Fallback: raw latlng — flat map: lng≈X, lat≈-Z
                        mcX = Math.round(latlng.lng);
                        mcZ = Math.round(-latlng.lat);
                        console.log('[Dynmap] Raw latlng→MC (lng→X, -lat→Z):', mcX, mcZ, '| raw latlng:', latlng.lat.toFixed(1), latlng.lng.toFixed(1));
                    }
                } catch (err) {
                    console.warn('[Dynmap] Map coord read failed:', err);
                }
            }

            // ── Method 2: Read Dynmap's coordinate display text ─────────────
            if (mcX == null) {
                const coordSelectors = [
                    '#mapcoords', '.mapcoords', '#coord', '.coord',
                    '.leaflet-control-coordinates', '[class*="coord"]'
                ];
                for (const sel of coordSelectors) {
                    const el = doc.querySelector(sel);
                    if (el && el.textContent) {
                        const txt = el.textContent;
                        // Try patterns like "X: 154, Z: -2803" or "154, 64, -2803"
                        const m1 = txt.match(/[Xx][:\s]+(-?\d+).*?[Zz][:\s]+(-?\d+)/);
                        const m2 = txt.match(/(-?\d+),\s*-?\d+,\s*(-?\d+)/);
                        if (m1) { mcX = parseInt(m1[1]); mcZ = parseInt(m1[2]); break; }
                        if (m2) { mcX = parseInt(m2[1]); mcZ = parseInt(m2[2]); break; }
                    }
                }
                if (mcX != null) console.log('[Dynmap] Coord from display text:', mcX, mcZ);
            }

            // ── Open delivery modal with whatever we got ─────────────────────
            showDeliveryModal(mcX, mcZ);
        });

        console.log('[Dynmap] Frame ready — right-click handler injected');
    } catch (err) {
        console.warn('[Dynmap] Could not inject into frame (cross-origin?):', err);
    }
});

function showDeliveryModal(x, z) {
    document.getElementById('m-x').value    = x != null ? x : '';
    document.getElementById('m-z').value    = z != null ? z : '';
    document.getElementById('m-y').value    = '67';
    document.getElementById('m-note').value = '';

    if (x != null && z != null) {
        const flash = document.getElementById('coord-flash');
        flash.textContent = `X ${x}  Z ${z}`;
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 1500);
    }

    showModal();
}

// ═══════════════════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════════════════

function switchTab(name) {
    const names = ['fleet','jobs','commands'];
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════════════════
// POLLING
// ═══════════════════════════════════════════════════════════════════════════

async function poll() {
    try {
        const r = await fetch('/state');
        const d = await r.json();
        lastState = d;
        renderAll(d);
        document.getElementById('status-dot').className = '';
        const ago = d.updatedAt ? Math.round((Date.now() - d.updatedAt) / 1000) : '?';
        document.getElementById('last-update').textContent = `synced ${ago}s ago`;
    } catch(e) {
        document.getElementById('status-dot').className = 'offline';
        document.getElementById('last-update').textContent = 'server offline';
    }
}
setInterval(poll, 2000);
poll();

// ═══════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════

function renderAll(d) {
    const turtles = d.turtles || {};
    const jobs    = d.jobs    || [];
    const tarr    = Object.values(turtles);
    const online  = tarr.filter(t => t.online).length;
    const active  = tarr.filter(t => t.online && t.status !== 'IDLE').length;
    const jobAct  = jobs.filter(j => j.status !== 'COMPLETE').length;

    document.getElementById('s-online').textContent = online;
    document.getElementById('s-active').textContent = active;
    document.getElementById('s-jobs').textContent   = jobAct;

    renderFleet(turtles);
    renderJobs(jobs);
    refreshTurtleSel(turtles);
}

function fuelClass(pct) {
    if (pct < 0.05) return 'crit';
    if (pct < 0.2)  return 'low';
    if (pct < 0.4)  return 'med';
    return '';
}

function renderFleet(turtles) {
    const el  = document.getElementById('tab-fleet');
    const arr = Object.entries(turtles).sort((a,b) => {
        if (a[1].role !== b[1].role) return a[1].role === 'DELIVERY' ? -1 : 1;
        return a[0].localeCompare(b[0]);
    });
    if (!arr.length) { el.innerHTML = '<div class="empty">NO TURTLES REGISTERED</div>'; return; }

    el.innerHTML = arr.map(([id, t]) => {
        const fuel = t.fuel || 0;
        const max  = t.fuelMax || 100000;
        const pct  = Math.min(1, fuel / max);
        const fc   = fuelClass(pct);
        const pos  = t.x != null ? `${Math.round(t.x)}, ${Math.round(t.z)}` : '—';
        const st   = t.status || 'UNKNOWN';
        return `<div class="turtle-card ${t.role||''}${!t.online?' offline':''}">
            <div class="tc-header">
                <div>
                    <button class="tc-locate" onclick="focusTurtle('${id}')">LOCATE</button>
                    <div class="tc-name">${id}</div>
                    <div class="tc-sub">${t.role||'?'} · ${t.dock||'?'}</div>
                </div>
                <div class="sbadge ${st}">${st}</div>
            </div>
            <div class="fuel-track"><div class="fuel-fill ${fc}" style="width:${Math.round(pct*100)}%"></div></div>
            <div class="tc-row">
                <span>FUEL <span class="v">${Math.round(pct*100)}%</span></span>
                <span>POS <span class="v">${pos}</span></span>
                ${t.jobId   ? `<span>JOB <span class="v">${t.jobId}</span></span>` : ''}
                ${!t.online ? '<span style="color:#ff4444">OFFLINE</span>' : ''}
            </div>
        </div>`;
    }).join('');
}

function renderJobs(jobs) {
    const el     = document.getElementById('tab-jobs');
    const active = jobs.filter(j => j.status !== 'COMPLETE');
    const recent = jobs.filter(j => j.status === 'COMPLETE').slice(-5);
    const all    = [...active, ...recent];
    if (!all.length) { el.innerHTML = '<div class="empty">NO ACTIVE JOBS</div>'; return; }

    el.innerHTML = all.map(j => `
        <div class="job-card ${j.status||''}">
            <div class="jc-top">
                <div><div class="jc-id">${j.id}</div><div class="jc-type">${j.type||'DELIVER'}</div></div>
                <div class="jbadge ${j.status||''}">${j.status||'?'}</div>
            </div>
            ${j.assignedTo ? `<div class="jc-assigned">→ ${j.assignedTo}</div>` : ''}
        </div>`).join('');
}

function refreshTurtleSel(turtles) {
    const sel = document.getElementById('turtle-sel');
    const cur = sel.value;
    sel.innerHTML = '<option value="">— Select turtle —</option>' +
        Object.keys(turtles).sort().map(id =>
            `<option value="${id}"${id===cur?' selected':''}>${id} [${turtles[id].status||'?'}]</option>`
        ).join('');
}

// Navigate Dynmap map to a turtle's position
function focusTurtle(id) {
    const t = lastState.turtles ? lastState.turtles[id] : null;
    if (!t || t.x == null) { toast('No position data for ' + id, true); return; }
    dynmapGoTo(t.x, t.y || 67, t.z);
    toast('Locating ' + id + '…');
}

// ═══════════════════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════════════════

function showModal() {
    document.getElementById('backdrop').classList.add('show');
    document.getElementById('modal').classList.add('show');
    document.getElementById('m-x').focus();
}

function closeModal() {
    document.getElementById('backdrop').classList.remove('show');
    document.getElementById('modal').classList.remove('show');
}

function openModalFromCmd() {
    document.getElementById('m-x').value    = document.getElementById('cx').value;
    document.getElementById('m-y').value    = document.getElementById('cy').value || '67';
    document.getElementById('m-z').value    = document.getElementById('cz').value;
    document.getElementById('m-note').value = '';
    showModal();
}

async function submitDelivery() {
    const x = parseInt(document.getElementById('m-x').value);
    const y = parseInt(document.getElementById('m-y').value) || 67;
    const z = parseInt(document.getElementById('m-z').value);
    if (isNaN(x) || isNaN(z)) { toast('Enter valid X and Z coordinates', true); return; }
    await sendCmd('DISPATCH_DELIVERY', { x, y, z, note: document.getElementById('m-note').value });
    closeModal();
    toast('Delivery dispatched!');
    switchTab('jobs');
}

// ═══════════════════════════════════════════════════════════════════════════
// COMMANDS
// ═══════════════════════════════════════════════════════════════════════════

async function cmdRecall() {
    const id = document.getElementById('turtle-sel').value;
    if (!id) { toast('Select a turtle first', true); return; }
    await sendCmd('RECALL', { turtleId: id, reason: 'admin_recall' });
    toast(`Recall sent → ${id}`);
}

async function cmdRecallAll() {
    if (!confirm('Recall ALL turtles to dock?')) return;
    await sendCmd('RECALL_ALL', { reason: 'admin_recall' });
    toast('Recall all sent');
}

async function cmdUpdateAll() {
    if (!confirm('OTA update all turtles? They will reboot.')) return;
    await sendCmd('UPDATE_ALL', {});
    toast('Update all sent');
}

async function sendCmd(type, params) {
    try {
        await fetch('/command', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, params }),
        });
    } catch(e) { toast('Command failed', true); }
}

let _toastTimer;
function toast(msg, err) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'show' + (err ? ' err' : '');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.className = '', 3000);
}
</script>
